name: github-runner

github:
  url: "https://github.com/test-dcmlp"

runner:
  name: "dcmlp-prod-github-runner"
  labels: "github,dcmlp-prod"
  ephemeral: "false"

config:
  tokenSecretName: github-runner-registration-token
  tokenSecretKey: RUNNER_TOKEN

proxy:
  http: "http://rb-proxy-emea.internal.bosch.cloud:8080"
  https: "http://rb-proxy-emea.internal.bosch.cloud:8080"
  noProxy: "localhost,127.0.0.1,.svc,.cluster.local,.internal.bosch.cloud,.bosch.com"

secrets:
  imagePull: dockerhub-cred
  proxyCAConfigMap: rb-proxy-tls-ca

# Image phải build với USER root (image/Dockerfile) — tag mới sau khi rebuild & push.
image:
  runner: docker.io/nor1hctools/deployments:cms-actions-runner-1.0.1
  registry: docker.io

serviceAccount:
  create: true
  name: github-runner
  clusterAdmin: true
  # Cluster admin — bắt buộc khi runAsRoot=true:
  # oc adm policy add-scc-to-user anyuid -z github-runner -n <namespace>

securityContext:
  runAsRoot: true
  runAsUser: 0

resources:
  requests:
    cpu: "1000m"
    memory: "4Gi"
    ephemeralStorage: "60Gi"
  limits:
    cpu: "1000m"
    memory: "4Gi"
    ephemeralStorage: "60Gi"

# /runner = emptyDir 60Gi (workspace)
workspace:
  sizeLimit: 60Gi

# /runner-state = PVC — lưu .runner / .credentials (cần root + anyuid SCC)
persistence:
  enabled: true
  storageClassName: ""
  size: 5Gi
  accessModes:
    - ReadWriteOnce