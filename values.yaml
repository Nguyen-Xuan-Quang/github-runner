name: github-runner

github:
  url: "https://github.com/test-dcmlp"

runner:
  name: "dcmlp-prod-github-runner"
  labels: "github,dcmlp-prod"
  ephemeral: "false"

config:
  tokenSecretName: github-runner-registration-token
  tokenSecretKey: RUNNER_TOKEN

proxy:
  http: "http://rb-proxy-emea.internal.bosch.cloud:8080"
  https: "http://rb-proxy-emea.internal.bosch.cloud:8080"
  noProxy: "localhost,127.0.0.1,.svc,.cluster.local,.internal.bosch.cloud,.bosch.com"

secrets:
  imagePull: dockerhub-cred
  proxyCAConfigMap: rb-proxy-tls-ca

# Image chạy NON-ROOT (USER runner, uid 1001 — xem image/Dockerfile).
image:
  runner: docker.io/nor1hctools/deployments:cms-actions-runner-1.0.0
  registry: docker.io

serviceAccount:
  create: true
  name: github-runner
  # clusterAdmin chỉ phục vụ JOB CI (oc apply/deploy vào cluster).
  # KHÔNG còn liên quan việc chạy root: pod giờ non-root, không cần anyuid cho uid.
  clusterAdmin: true

securityContext:
  # Non-root: chạy bằng user 'runner' (uid 1001) đã bake sẵn trong image.
  runAsUser: 1001
  runAsGroup: 1001
  # fsGroup = gid runner → OpenShift tự chown PVC /runner-state + emptyDir sang
  # gid này (CSI cinder fsGroupPolicy=File) nên runner GHI ĐƯỢC state mà không
  # cần root và không cần RUNNER_ALLOW_RUNASROOT.
  fsGroup: 1001

resources:
  requests:
    cpu: "1000m"
    memory: "4Gi"
    ephemeralStorage: "60Gi"
  limits:
    cpu: "1000m"
    memory: "4Gi"
    ephemeralStorage: "60Gi"

# /runner = emptyDir 60Gi (workspace)
workspace:
  sizeLimit: 60Gi

# /runner-state = PVC — lưu .runner / .credentials (cần root + anyuid SCC)
persistence:
  enabled: true
  storageClassName: ""
  size: 5Gi
  accessModes:
    - ReadWriteOnce