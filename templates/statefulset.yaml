apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.name }}
spec:
  serviceName: {{ .Values.name }}
  replicas: 1
  # OrderedReady: wait for pod-N to be Running before pod-N+1; on delete, the
  # terminating pod keeps its name so no second pod mounts the RWO PVC.
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ .Values.securityContext.runAsUser | int }}
        runAsGroup: {{ .Values.securityContext.runAsGroup | int }}
        fsGroup: {{ .Values.securityContext.fsGroup | int }}
      enableServiceLinks: false
      containers:
        - name: runner
          image: {{ .Values.image.runner }}
          securityContext:
            runAsNonRoot: true
            runAsUser: {{ .Values.securityContext.runAsUser | int }}
            runAsGroup: {{ .Values.securityContext.runAsGroup | int }}
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: RUNNER_URL
              value: {{ .Values.github.url | quote }}
            - name: RUNNER_NAME
              value: {{ .Values.runner.name | quote }}
            - name: RUNNER_LABELS
              value: {{ .Values.runner.labels | quote }}
            - name: EPHEMERAL
              value: {{ .Values.runner.ephemeral | quote }}
            - name: RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.tokenSecretName }}
                  key: {{ .Values.config.tokenSecretKey }}
            - name: HOME
              value: "/runner"
            {{- include "github-runner.proxyEnv" . | nindent 12 }}
            - name: SSL_CERT_FILE
              value: "/etc/docker/certs.d/ca-bundle.crt"
            - name: CURL_CA_BUNDLE
              value: "/etc/docker/certs.d/ca-bundle.crt"
            - name: REQUESTS_CA_BUNDLE
              value: "/etc/docker/certs.d/ca-bundle.crt"
            - name: NODE_EXTRA_CA_CERTS
              value: "/etc/docker/certs.d/ca-bundle.crt"
          command:
            - bash
            - -c
            - |
              set -e
              echo "Runner name: ${RUNNER_NAME}"
              echo "Labels: ${RUNNER_LABELS}"
              echo "URL: ${RUNNER_URL}"

              REGISTRY={{ .Values.image.registry }}
              mkdir -p /etc/docker/certs.d/${REGISTRY}
              cp /rb-proxy-ca/ca.crt /etc/docker/certs.d/${REGISTRY}/ca.crt
              cat /etc/ssl/certs/ca-certificates.crt /rb-proxy-ca/ca.crt > /etc/docker/certs.d/ca-bundle.crt

              restore_state() {
                if [ ! -f /runner-state/.runner ]; then
                  return 0
                fi
                echo "Restoring runner state from PVC /runner-state..."
                for f in .runner .credentials .credentials_rsaparams .env .path; do
                  [ -f "/runner-state/${f}" ] && cp "/runner-state/${f}" /runner/
                done
              }

              save_state() {
                mkdir -p /runner-state
                echo "Saving runner state to PVC /runner-state..."
                for f in .runner .credentials .credentials_rsaparams .env .path; do
                  [ -f "/runner/${f}" ] && cp "/runner/${f}" /runner-state/
                done
              }

              echo "Copying runner assets to /runner (emptyDir)..."
              shopt -s dotglob
              cp -r /runnertmp/. /runner/
              shopt -u dotglob
              cd /runner

              restore_state

              if [ ! -f /runner/.runner ]; then
                echo "Running config.sh with provided registration token..."
                ./config.sh \
                  --url "${RUNNER_URL}" \
                  --token "${RUNNER_TOKEN}" \
                  --name "${RUNNER_NAME}" \
                  --labels "${RUNNER_LABELS}" \
                  --ephemeral "${EPHEMERAL}" \
                  --unattended \
                  --replace
                save_state
              else
                echo "Runner already configured, skipping config.sh"
              fi

              echo "Starting runner..."
              exec ./run.sh
          volumeMounts:
            - name: work
              mountPath: /runner
            {{- if .Values.persistence.enabled }}
            - name: runner-state
              mountPath: /runner-state
            {{- end }}
            - name: runner-home
              mountPath: /home/runner
            - name: runner-certs
              mountPath: /etc/docker/certs.d
            - name: rb-proxy-tls-ca
              mountPath: /rb-proxy-ca
              readOnly: true
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
              {{- if .Values.resources.requests.ephemeralStorage }}
              ephemeral-storage: {{ .Values.resources.requests.ephemeralStorage | quote }}
              {{- end }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
              {{- if .Values.resources.limits.ephemeralStorage }}
              ephemeral-storage: {{ .Values.resources.limits.ephemeralStorage | quote }}
              {{- end }}

      volumes:
        - name: work
          emptyDir:
            sizeLimit: {{ .Values.workspace.sizeLimit }}
        {{- if .Values.persistence.enabled }}
        - name: runner-state
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-runner-state
        {{- end }}
        - name: runner-home
          emptyDir: {}
        - name: runner-certs
          emptyDir: {}
        - name: rb-proxy-tls-ca
          configMap:
            name: {{ .Values.secrets.proxyCAConfigMap }}
      {{- if .Values.secrets.imagePull }}
      imagePullSecrets:
        - name: {{ .Values.secrets.imagePull }}
      {{- end }}