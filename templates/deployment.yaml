apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
    spec:
      # restricted-v2 SCC assigns a numeric runAsUser from the namespace UID range.
      # Do not set runAsNonRoot here: base image uses USER "runner" (non-numeric).
      enableServiceLinks: false
      containers:
        - name: runner
          image: {{ .Values.image.runner }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: RUNNER_URL
              value: {{ .Values.github.url | quote }}
            - name: RUNNER_NAME
              value: {{ .Values.runner.name | quote }}
            - name: RUNNER_LABELS
              value: {{ .Values.runner.labels | quote }}
            - name: EPHEMERAL
              value: {{ .Values.runner.ephemeral | quote }}
            - name: RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.tokenSecretName }}
                  key: {{ .Values.config.tokenSecretKey }}
            - name: HOME
              value: "/runner"
            {{- include "github-runner.proxyEnv" . | nindent 12 }}
            - name: SSL_CERT_FILE
              value: "/etc/docker/certs.d/ca-bundle.crt"
            - name: CURL_CA_BUNDLE
              value: "/etc/docker/certs.d/ca-bundle.crt"
            - name: REQUESTS_CA_BUNDLE
              value: "/etc/docker/certs.d/ca-bundle.crt"
            - name: NODE_EXTRA_CA_CERTS
              value: "/etc/docker/certs.d/ca-bundle.crt"
          command:
            - bash
            - -c
            - |
              set -e
              echo "Runner name: ${RUNNER_NAME}"
              echo "Labels: ${RUNNER_LABELS}"
              echo "URL: ${RUNNER_URL}"

              REGISTRY={{ .Values.image.registry }}
              mkdir -p /etc/docker/certs.d/${REGISTRY}
              cp /rb-proxy-ca/ca.crt /etc/docker/certs.d/${REGISTRY}/ca.crt
              cat /etc/ssl/certs/ca-certificates.crt /rb-proxy-ca/ca.crt > /etc/docker/certs.d/ca-bundle.crt

              echo "Copying runner assets to /runner..."
              shopt -s dotglob
              cp -r /runnertmp/. /runner/
              shopt -u dotglob
              cd /runner

              if [ ! -f /runner/.runner ]; then
                echo "Running config.sh with provided registration token..."
                ./config.sh \
                  --url "${RUNNER_URL}" \
                  --token "${RUNNER_TOKEN}" \
                  --name "${RUNNER_NAME}" \
                  --labels "${RUNNER_LABELS}" \
                  --ephemeral "${EPHEMERAL}" \
                  --unattended \
                  --replace
              else
                echo "Runner already configured, skipping config.sh"
              fi

              echo "Starting runner..."
              exec ./run.sh
          volumeMounts:
            - name: work
              mountPath: /runner
            - name: runner-home
              mountPath: /home/runner
            - name: runner-certs
              mountPath: /etc/docker/certs.d
            - name: rb-proxy-tls-ca
              mountPath: /rb-proxy-ca
              readOnly: true
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}

      volumes:
        - name: work
          emptyDir: {}
        {{- if .Values.persistence.enabled }}
        - name: runner-home
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-runner-state
        {{- else }}
        - name: runner-home
          emptyDir: {}
        {{- end }}
        - name: runner-certs
          emptyDir: {}
        - name: rb-proxy-tls-ca
          configMap:
            name: {{ .Values.secrets.proxyCAConfigMap }}
      {{- if .Values.secrets.imagePull }}
      imagePullSecrets:
        - name: {{ .Values.secrets.imagePull }}
      {{- end }}